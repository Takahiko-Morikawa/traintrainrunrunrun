<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ライト乗換案内 Prototype v1.17</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --danger: #dc2626; --warning: #d97706; --gray: #475569; --light-blue: #eef2ff; }
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f1f5f9; color: #334155; line-height: 1.6; overflow-x: hidden; }
        
        /* 電車アニメーション */
        .train-track { width: 100%; height: 40px; background: #e2e8f0; border-bottom: 2px solid #cbd5e1; position: relative; margin-bottom: 20px; overflow: hidden; border-radius: 8px; }
        .train-track::before { content: ""; position: absolute; bottom: 5px; width: 100%; height: 2px; background: repeating-linear-gradient(90deg, #94a3b8, #94a3b8 10px, transparent 10px, transparent 20px); }
        .train-sprite { position: absolute; bottom: 8px; left: -100px; font-size: 24px; animation: trainRun 4s linear infinite; }
        @keyframes trainRun { 0% { left: -100px; } 80% { left: 110%; } 100% { left: 110%; } }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; position: relative; }
        header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; position: relative; }
        .header-logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); background: white; object-fit: contain; }
        h1 { font-size: 1.6rem; color: var(--primary); margin: 0; }

        .bgm-controls { position: absolute; right: 0; top: 50%; transform: translateY(-50%); }
        .btn-bgm { background: white; border: 1px solid #cbd5e1; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; }

        .card h2 { font-size: 0.9rem; margin: 0 0 15px 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; color: #1e293b; }
        label { display: block; margin-top: 12px; font-size: 0.85rem; font-weight: bold; color: #64748b; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .favorite-route { background: var(--light-blue); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #c3dafe; }
        .btn-fav-go { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        .price-alert { padding: 10px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; text-align: center; border: 1px solid #cbd5e1; }
        .hike-yes { color: #ffffff; background-color: #ef4444; }
        .hike-no { color: #94a3b8; background-color: #ffffff; }

        .mascot-area { display: none; align-items: flex-start; gap: 10px; margin-top: 20px; }
        .mascot-img { width: 60px; height: auto; border-radius: 10px; object-fit: contain; }
        
        .bubble { position: relative; padding: 15px; border-radius: 15px; flex: 1; font-weight: bold; font-size: 0.95rem; border: 3px solid; }
        .bubble::after { content: ''; position: absolute; left: -12px; top: 15px; border-style: solid; border-width: 8px 12px 8px 0; }
        .is-valid .bubble { background: #dcfce7; color: var(--success); border-color: var(--success); }
        .is-valid .bubble::after { border-color: transparent var(--success) transparent transparent; }
        .is-invalid .bubble { background: #fff7ed; color: var(--warning); border-color: #fbd38d; }
        .is-invalid .bubble::after { border-color: transparent #fbd38d transparent transparent; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; margin-top: 20px; }
        .btn-save { background: var(--gray); width: 100%; margin-top: 15px; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-teiki-check { background: #ffffff; border: 2px solid var(--gray); color: var(--gray); width: 100%; margin-top: 10px; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <audio id="trainBgm" src="trainBGM.mp3" loop></audio>
    <div style="text-align:right; font-size:0.6rem; color:#ccc; margin-bottom:5px;">Prototype v1.17</div>

    <div class="train-track">
        <div class="train-sprite">🚃🚋🚋💨</div>
    </div>

    <header>
        <img src="NUKOekiin.png" alt="NUKO" class="header-logo">
        <h1 style="font-size:1.4rem;">ライト乗換案内</h1>
        <div class="bgm-controls">
            <button class="btn-bgm" onclick="toggleBgm()" id="bgmBtn">🔈 BGM OFF</button>
        </div>
    </header>

    <div class="card">
        <h2>⚙️ 定期・拠点・よく使うルートの設定</h2>
        <label>最寄り駅 (3つまで)</label>
        <div style="display: flex; gap: 6px;">
            <input type="text" id="h1" placeholder="駅1">
            <input type="text" id="h2" placeholder="駅2">
            <input type="text" id="h3" placeholder="駅3">
        </div>

        <label>定期券情報</label>
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <input type="text" id="ts" placeholder="定期 出発駅">
            <input type="text" id="v1" placeholder="定期 経由駅">
            <input type="text" id="te" placeholder="定期 到着駅">
            <label style="margin-top:5px; font-size:0.75rem;">定期購入日</label>
            <input type="date" id="p_date">
        </div>

        <label>よく使うルート (3つまで)</label>
        <div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" id="f1s" placeholder="発1"> <input type="text" id="f1d" placeholder="着1"></div>
        <div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" id="f2s" placeholder="発2"> <input type="text" id="f2d" placeholder="着2"></div>
        <div style="display:flex; gap:5px;"><input type="text" id="f3s" placeholder="発3"> <input type="text" id="f3d" placeholder="着3"></div>
        
        <button class="btn-save" onclick="saveData()">設定を保存する</button>

        <div id="teikiLinkArea" style="display:none;">
            <button class="btn-teiki-check" onclick="searchTeiki()">ジョルダンで 定期ルート検索 を開く</button>
        </div>
    </div>

    <div id="favArea" class="card" style="display:none;">
        <h2 style="color: var(--success); border-bottom-color: var(--success);">⭐ よく使うルート</h2>
        <div id="favList"></div>
    </div>

    <div class="card">
        <h2 style="border-bottom-color: var(--primary); color: var(--primary);">🔍 本日のルート検索で定期が使えるか調べてみよう</h2>
        
        <div id="priceAlertArea" class="price-alert"></div>

        <label>出発地</label>
        <select id="startSelect"></select>
        
        <label>目的地</label>
        <input type="text" id="destInput" placeholder="目的駅を入力" style="border: 2px solid #333;" oninput="judgePass()">

        <div id="passStatus" class="mascot-area">
            <img src="NUKOekiin.png" alt="NUKO" class="mascot-img">
            <div class="bubble" id="statusMessage"></div>
        </div>

        <button class="btn-main" onclick="searchNormal()">ジョルダンでルート検索を開く</button>
    </div>

    <script>
        // 関東広域・主要路線データベース
        const LINE_DATA = {
            "山手線": ["東京","神田","秋葉原","御徒町","上野","鶯谷","日暮里","西日暮里","田端","駒込","巣鴨","大塚","池袋","目白","高田馬場","新大久保","新宿","代々木","原宿","渋谷","恵比寿","目黒","五反田","大崎","品川","高輪ゲートウェイ","田町","浜松町","新橋","有楽町"],
            "埼京線": ["大崎","恵比寿","渋谷","新宿","池袋","板橋","十条","赤羽","北赤羽","浮間舟渡","戸田公園","戸田","北戸田","武蔵浦和","中浦和","南与野","与野本町","北与野","大宮"],
            "京浜東北線": ["大宮","さいたま新都心","浦和","南浦和","蕨","西川口","川口","赤羽","東十条","王子","上中里","田端","西日暮里","日暮里","鶯谷","上野","御徒町","秋葉原","神田","東京","有楽町","新橋","浜松町","田町","高輪ゲートウェイ","品川","大井町","大森","蒲田","川崎","鶴見","新子安","東神奈川","横浜","桜木町","関内","石川町","山手","根岸","磯子","石川町","洋光台","港南台","本郷台","大船"],
            "武蔵野線": ["府中本町","北府中","西国分寺","新小平","新秋津","東所沢","新座","北朝霞","西浦和","武蔵浦和","南浦和","東浦和","東川口","南越谷","越谷レイクタウン","吉川","吉川美南","新三郷","三郷","南流山","新松戸","西船橋"],
            "湘南新宿ライン": ["前橋","高崎","本庄","深谷","熊谷","鴻巣","北本","桶川","上尾","大宮","浦和","赤羽","池袋","新宿","渋谷","恵比寿","大崎","武蔵小杉","横浜","戸塚","大船","藤沢","辻堂","茅ケ崎","平塚","二宮","国府津","小田原"],
            "丸ノ内線": ["池袋","新大塚","茗荷谷","後楽園","本郷三丁目","御茶ノ水","淡路町","大手町","東京","銀座","霞ケ関","国会議事堂前","赤坂見附","四ツ谷","四谷三丁目","新宿御苑前","新宿三丁目","新宿","西新宿","中野坂上","新中野","東高円寺","新高円寺","阿佐ケ谷","荻窪"],
            "東武スカイツリーライン": ["浅草","とうきょうスカイツリー","曳舟","北千住","小菅","五反野","梅島","西新井","竹ノ塚","谷塚","草加","獨協大学前","新田","蒲生","新越谷","越谷","北越谷","大袋","せんげん台","武里","一ノ割","春日部","北春日部","姫宮","東武動物公園"],
            "東武東上線": ["池袋","北池袋","下板橋","大山","中板橋","ときわ台","上板橋","練馬北町","下赤塚","成増","和光市","朝霞","朝霞台","志木","柳瀬川","みずほ台","鶴瀬","ふじみ野","上福岡","新河岸","川越","川越市"],
            "西武池袋線": ["池袋","椎名町","東長崎","江古田","桜台","練馬","中村橋","富士見台","練馬高野台","石神井公園","大泉学園","保谷","ひばりヶ丘","東久留米","清瀬","秋津","所沢","西所沢","小手指"],
            "西武新宿線": ["西武新宿","高田馬場","下落合","中井","新井薬師前","沼袋","野方","都立家政","鷺ノ宮","下井草","井荻","上井草","上石神井","武蔵関","東伏見","西武柳沢","田無","花小金井","小平","久米川","東村山","所沢","航空公園","新所沢"],
            "東急東横線": ["渋谷","代官山","中目黒","祐天寺","学芸大学","都立大学","自由が丘","田園調布","多摩川","新丸子","武蔵杉","元住吉","日吉","綱島","大倉山","菊名","妙蓮寺","白楽","東白楽","反町","横浜"]
        };

        function normalize(s) {
            if (!s) return "";
            let n = s.trim().replace(/駅$/, "");
            const map = {'1':'一','2':'二','3':'三','4':'四','5':'五','6':'六','7':'七','8':'八','9':'九','0':'〇','１':'一','２':'二','３':'三','４':'四','５':'五','６':'六','７':'七','８':'八','９':'九','０':'〇'};
            return n.replace(/[0-9０-９]/g, m => map[m]||m).replace(/ヶ|ヶ|個/g, "ケ");
        }

        // 保存機能（p_dateを含めて確実に実行）
        function saveData() {
            try {
                const d = {
                    h1: document.getElementById('h1').value, h2: document.getElementById('h2').value, h3: document.getElementById('h3').value,
                    ts: document.getElementById('ts').value, te: document.getElementById('te').value, v1: document.getElementById('v1').value,
                    p_date: document.getElementById('p_date').value,
                    f1s: document.getElementById('f1s').value, f1d: document.getElementById('f1d').value,
                    f2s: document.getElementById('f2s').value, f2d: document.getElementById('f2d').value,
                    f3s: document.getElementById('f3s').value, f3d: document.getElementById('f3d').value
                };
                localStorage.setItem('lite_transit_117', JSON.stringify(d));
                alert('設定を保存しました。');
                location.reload();
            } catch (e) {
                alert('保存エラーが発生しました。入力を確認してください。');
            }
        }

        window.onload = function() {
            const raw = localStorage.getItem('lite_transit_117');
            if (raw) {
                const d = JSON.parse(raw);
                document.getElementById('h1').value = d.h1||''; document.getElementById('h2').value = d.h2||''; document.getElementById('h3').value = d.h3||'';
                document.getElementById('ts').value = d.ts||''; document.getElementById('te').value = d.te||''; document.getElementById('v1').value = d.v1||'';
                document.getElementById('p_date').value = d.p_date||'';
                document.getElementById('f1s').value = d.f1s||''; document.getElementById('f1d').value = d.f1d||'';
                document.getElementById('f2s').value = d.f2s||''; document.getElementById('f2d').value = d.f2d||'';
                document.getElementById('f3s').value = d.f3s||''; document.getElementById('f3d').value = d.f3d||'';

                const sel = document.getElementById('startSelect');
                [d.h1, d.h2, d.h3].forEach(h => { if(h) sel.add(new Option(h, h)); });
                
                checkPriceHike(d);
                if(d.ts && d.te) document.getElementById('teikiLinkArea').style.display = 'block';
                renderFavs(d);
            }
        };

        function renderFavs(d) {
            const list = document.getElementById('favList');
            const area = document.getElementById('favArea');
            let hasFav = false;
            list.innerHTML = "";
            [[d.f1s, d.f1d], [d.f2s, d.f2d], [d.f3s, d.f3d]].forEach(pair => {
                if (pair[0] && pair[1]) {
                    hasFav = true;
                    const div = document.createElement('div');
                    div.className = 'favorite-route';
                    div.innerHTML = `<span>${pair[0]} ➔ ${pair[1]}</span><button class="btn-fav-go" onclick="launchJorudan('${pair[0]}','${pair[1]}')">検索</button>`;
                    list.appendChild(div);
                }
            });
            if (hasFav) area.style.display = 'block';
        }

        function checkPriceHike(d) {
            const area = document.getElementById('priceAlertArea');
            const hasJR = [d.ts, d.te, d.v1].some(s => s && s.includes("JR"));
            if (hasJR) { area.className = "price-alert hike-yes"; area.innerText = "🚨 料金変更予定あり（JR区間）"; }
            else { area.className = "price-alert hike-no"; area.innerText = "当月内の料金変更なし"; }
        }

        function judgePass() {
            const destRaw = document.getElementById('destInput').value;
            const container = document.getElementById('passStatus');
            const messageBox = document.getElementById('statusMessage');
            const dest = normalize(destRaw);
            const ts = normalize(document.getElementById('ts').value);
            const v1 = normalize(document.getElementById('v1').value);
            const te = normalize(document.getElementById('te').value);
            const points = [ts, v1, te].filter(s => s !== "");

            if (!dest || points.length < 2) { container.style.display = 'none'; return; }

            let canUse = false;
            for (let i = 0; i < points.length - 1; i++) {
                const pS = points[i]; const pE = points[i+1];
                for (let line in LINE_DATA) {
                    const stations = LINE_DATA[line].map(s => normalize(s));
                    const idxS = stations.indexOf(pS); const idxE = stations.indexOf(pE); const idxD = stations.indexOf(dest);
                    if (idxS !== -1 && idxE !== -1 && idxD >= Math.min(idxS, idxE) && idxD <= Math.max(idxS, idxE)) { canUse = true; break; }
                }
                if (canUse) break;
            }

            container.style.display = 'flex';
            if (canUse) {
                container.className = 'mascot-area is-valid';
                messageBox.innerHTML = `出発進行！<br>${destRaw}は定期券が使えますよ！`;
            } else {
                container.className = 'mascot-area is-invalid';
                messageBox.innerHTML = `注意！<br>${destRaw}は定期区間外のようです。`;
            }
        }

        function launchJorudan(s, d) {
            const url = `https://www.jorudan.co.jp/norikae/cgi/nori.cgi?eki1=${encodeURIComponent(s)}&eki2=${encodeURIComponent(d)}&Spriority=2&rf=nr&pg=0&eok1=R-&eok2=R-&type=t`;
            window.open(url, '_blank');
        }

        function searchTeiki() {
            const ts = document.getElementById('ts').value;
            const te = document.getElementById('te').value;
            const v1 = document.getElementById('v1').value;
            const viaParam = v1 ? `&eki3=${encodeURIComponent(v1)}` : "";
            const url = `https://www.jorudan.co.jp/norikae/cgi/nori.cgi?eki1=${encodeURIComponent(ts)}&eki2=${encodeURIComponent(te)}${viaParam}&Spriority=2&rf=nr&pg=0&eok1=R-&eok2=R-&type=t`;
            window.open(url, '_blank');
        }

        function searchNormal() {
            const start = document.getElementById('startSelect').value;
            const dest = document.getElementById('destInput').value;
            if (!dest) return alert('目的地を入力してください');
            launchJorudan(start, dest);
        }

        let isPlaying = false;
        function toggleBgm() {
            const bgm = document.getElementById('trainBgm');
            if (isPlaying) { bgm.pause(); document.getElementById('bgmBtn').innerText = '🔈 BGM OFF'; }
            else { bgm.play(); document.getElementById('bgmBtn').innerText = '🔊 BGM ON'; }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
